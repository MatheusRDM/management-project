# =============================================================================
# CLOUD BUILD — Pipeline CI/CD Enterprise
# GitHub (master) → Build → Push → Deploy → Cloud Run
# Afirma E-vias Management System
# =============================================================================
#
# SETUP ÚNICO (executar uma vez no terminal):
#   gcloud config set project SEU_PROJECT_ID
#   bash setup_gcp.sh SEU_PROJECT_ID
#
# APÓS SETUP: cada push em master faz deploy automático.
# =============================================================================

substitutions:
  _SERVICE_NAME: afirma-evias
  _REGION: us-central1
  _IMAGE: gcr.io/$PROJECT_ID/afirma-evias

steps:

  # ── 1. Build da imagem (multi-stage) ────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '--tag=${_IMAGE}:$COMMIT_SHA'
      - '--tag=${_IMAGE}:latest'
      - '--cache-from=${_IMAGE}:latest'
      - '--build-arg=BUILDKIT_INLINE_CACHE=1'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'

  # ── 2. Push para Container Registry ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    waitFor: ['build']
    args:
      - 'push'
      - '--all-tags'
      - '${_IMAGE}'

  # ── 3. Deploy no Cloud Run ───────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: 'deploy'
    waitFor: ['push']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_IMAGE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=5'
      - '--timeout=300'
      - '--port=8080'
      - '--concurrency=80'
      - '--set-env-vars=PYTHONUNBUFFERED=1'
      - '--quiet'

images:
  - '${_IMAGE}:$COMMIT_SHA'
  - '${_IMAGE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  dynamic_substitutions: true

timeout: '1200s'
